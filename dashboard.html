<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIRA ダッシュボード</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Yu Gothic UI", sans-serif;
        }

        body{
            background:#f5f7fa;
        }

        header{
            background:#0d6efd;
            color:white;
            padding:20px;
        }

        header h1{
            font-size:30px;
        }

        header p{
            margin-top:5px;
        }

        main{
            max-width:1200px;
            margin:auto;
            padding:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

        .card h3{
            margin-bottom:10px;
        }

        .menu{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:20px;
        }

        button{
            border:none;
            background:#0d6efd;
            color:white;
            padding:18px;
            font-size:17px;
            border-radius:12px;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            background:#084298;
        }
    </style>
</head>

<body>

<header>
    <h1>ZAIRA</h1>
    <p>あなたの会社に、もう一人。</p>
</header>

<main>

<div class="cards">

<div class="card">
<h3>今日の売上</h3>
<p>¥0</p>
</div>

<div class="card">
<h3>今月の売上</h3>
<p>¥0</p>
</div>

<div class="card">
<h3>利益</h3>
<p>¥0</p>
</div>

<div class="card">
<h3>在庫不足</h3>
<p>0件</p>
</div>

</div>

<h2 style="margin-bottom:20px;">クイックメニュー</h2>

<div class="menu">

<button onclick="location.href='products.html'">商品管理</button>

<button onclick="location.href='inventory.html'">在庫管理</button>

<button onclick="location.href='accounting.html'">会計</button>

<button onclick="location.href='analysis.html'">分析</button>

<button onclick="location.href='ai.html'">AI</button>

<button onclick="location.href='settings.html'">設定</button>

</div>

</main>

<script>
function openMenu(name){
    alert(name + " を開きます。");
}
</script>

</body>
</html>
