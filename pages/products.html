<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>商品管理 | ZAIRA</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/products.css">

</head>

<body>

<header>

    <div>

        <h1 class="logo">ZAIRA</h1>

        <p class="tagline">
            あなたの会社に、もう一人。
        </p>

    </div>

    <nav>

        <a href="../dashboard.html">ダッシュボード</a>

        <a href="products.html">商品管理</a>

        <a href="inventory.html">在庫管理</a>

        <a href="sales.html">売上管理</a>

        <a href="accounting.html">会計</a>

        <a href="analytics.html">分析</a>

        <a href="ai.html">ZAIRA AI</a>

    </nav>

</header>

<main class="container">

    <div class="card">

        <h2 class="card-title">

            商品登録

        </h2>

        <form id="productForm">

            <label>

                商品名

                <input
                    type="text"
                    id="productName"
                    required>

            </label>

            <label>

                JANコード

                <input
                    type="text"
                    id="janCode">

            </label>

            <label>

                カテゴリー

                <input
                    type="text"
                    id="category">

            </label>

            <label>

                販売価格（税込）

                <input
                    type="number"
                    id="price">

            </label>

            <label>

                原価

                <input
                    type="number"
                    id="cost">

            </label>

            <label>

                初期在庫数

                <input
                    type="number"
                    id="stock">

            </label>

            <label>

                最低在庫数

                <input
                    type="number"
                    id="minimumStock">

            </label>

            <label>

                保管場所

                <input
                    type="text"
                    id="location">

            </label>

            <label>

                メモ

                <textarea
                    id="memo"
                    rows="4"></textarea>

            </label>

            <button
                type="submit">

                商品を登録

            </button>

        </form>

    </div>

    <div class="card">

        <h2 class="card-title">

            商品一覧

        </h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>商品名</th>

                    <th>在庫</th>

                    <th>販売価格</th>

                    <th>原価</th>

                    <th>カテゴリー</th>

                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="productTable">

                <!-- JavaScriptで表示 -->

            </tbody>

        </table>

    </div>

</main>

<footer>

    © ZAIRA

</footer>

<script src="../js/app.js"></script>

<script src="../js/products.js"></script>

</body>

</html>
