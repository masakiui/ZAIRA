<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>分析 | ZAIRA</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/analytics.css">

</head>

<body>

<header>

    <div>

        <h1 class="logo">ZAIRA</h1>

        <p class="tagline">あなたの会社に、もう一人。</p>

    </div>

    <nav>

        <a href="../dashboard.html">ダッシュボード</a>
        <a href="products.html">商品管理</a>
        <a href="inventory.html">在庫管理</a>
        <a href="sales.html">売上管理</a>
        <a href="accounting.html">会計</a>
        <a href="analytics.html">分析</a>
        <a href="ai.html">ZAIRA AI</a>

    </nav>

</header>

<main class="container">

    <!-- KPI -->

    <div class="grid grid-4">

        <div class="card summary-card">
            <h3>総売上</h3>
            <p id="kpiSales">¥0</p>
        </div>

        <div class="card summary-card">
            <h3>総利益</h3>
            <p id="kpiProfit">¥0</p>
        </div>

        <div class="card summary-card">
            <h3>売上件数</h3>
            <p id="kpiCount">0</p>
        </div>

        <div class="card summary-card">
            <h3>在庫回転</h3>
            <p id="kpiTurnover">0%</p>
        </div>

    </div>

    <!-- 商品ランキング -->

    <div class="card">

        <h2 class="card-title">売上ランキング</h2>

        <table>

            <thead>
                <tr>
                    <th>順位</th>
                    <th>商品名</th>
                    <th>売上金額</th>
                    <th>販売数</th>
                </tr>
            </thead>

            <tbody id="rankingTable"></tbody>

        </table>

    </div>

    <!-- 在庫警告 -->

    <div class="card">

        <h2 class="card-title">在庫アラート</h2>

        <table>

            <thead>
                <tr>
                    <th>商品名</th>
                    <th>在庫</th>
                    <th>最低在庫</th>
                    <th>状態</th>
                </tr>
            </thead>

            <tbody id="alertTable"></tbody>

        </table>

    </div>

    <!-- トレンド -->

    <div class="card">

        <h2 class="card-title">売上トレンド（簡易）</h2>

        <div id="trendBox" style="padding:10px; line-height:1.8;"></div>

    </div>

</main>

<footer>

    © ZAIRA

</footer>

<script src="../js/app.js"></script>
<script src="../js/analytics.js"></script>

</body>

</html>
